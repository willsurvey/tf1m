# ============================================================
# XAUUSD AGGRO V6 — Configuration
# 100% identik dengan Pine Script "XAUUSD M1 AGGRO V6"
# ============================================================

strategy:
  symbol: "XAUUSD"
  timeframe: "M1"

  indicators:
    # EMA — Pine: emaFast=5, emaSlow=13
    ema_fast: 5
    ema_slow: 13
    # RSI — Pine: rsiLen=7, rsiOB=60, rsiOS=40
    rsi_period: 7
    rsi_ob: 60
    rsi_os: 40
    # ATR — Pine: atrLen=10
    atr_period: 10
    atr_avg_period: 100
    # Donchian — Pine: dcLen=10 (pakai dcHigh[1] dan dcLow[1])
    donchian_period: 10

  exit:
    # Pine: tpMult=2.5, slMult=1.2
    tp_atr_mult: 2.5
    sl_atr_mult: 1.2
    # Pine: trailMult=0.8, trail_offset=trailTicks*0.3
    # trail_atr_mult  = jarak SL dari extreme = 0.8 * 0.3 = 0.24 ATR
    # trail_offset_ratio = aktivasi saat profit >= 0.8 ATR (= trail_points)
    trail_atr_mult: 0.24
    trail_offset_ratio: 0.8
    # Breakeven: pindah SL ke entry saat profit >= 0.5 ATR (extra safety, tidak di Pine)
    breakeven_trigger: 0.5

  filters:
    # Pine: tradingSession = "1200-2100"
    session_start_utc: "12:00"
    session_end_utc: "21:00"
    force_close_utc: "20:55"
    trading_days: [0, 1, 2, 3, 4]   # 0=Monday ... 4=Friday
    # Pine: spikeThresh=2.0
    atr_spike_threshold: 2.0

  news:
    enabled: true
    blackout_before_min: 15
    blackout_after_min: 10
    impact_levels: ["high"]
    currencies: ["USD"]
    cache_ttl_hours: 6

risk:
  lot_size: 0.02
  # Pine: pyramiding=3
  max_pyramiding: 3
  max_daily_loss_pct: 3.0
  max_total_loss_pct: 30.0
  consecutive_loss_cooldown: 3
  cooldown_minutes: 30
  disconnect_timeout_sec: 30

mt5:
  magic_number: 20260629
  deviation: 20

notifications:
  telegram:
    enabled: true

logging:
  level: "INFO"
  file_rotation: "10 MB"
  file_retention: "30 days"
  console: true
